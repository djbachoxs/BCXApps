            const total = item.quantity * item.price;
            const disc = (total * (item.discount || 0)) / 100;
            return total - disc;

            return icons[name] || <span>?</span>;

                            {data.logo ? (

                                    Logo
                                </div>
                            )}

                                    <td className="py-4 text-right text-sm text-gray-600">{formatIdr(item.price)}</td>
                                    <td className="py-4 text-right text-sm text-red-500">{item.discount > 0 ? item.discount + '%' : '-'}</td>

                logo: null,
                signature: null,

            useEffect(() => {

                // Update default values slightly when switching modes if fields are empty or generic
                // This is optional but helps context
                if (mode === MODES.QUOTATION && docData.number.startsWith('INV')) {
                    setDocData(prev => ({...prev, number: prev.number.replace('INV', 'QTN')}));
                } else if (mode === MODES.INVOICE && docData.number.startsWith('QTN')) {
                    setDocData(prev => ({...prev, number: prev.number.replace('QTN', 'INV')}));
                }
            }, [mode]);

            const loadSlotsFromStorage = () => {
                const key = THEMES[mode].storageKey;
                const saved = localStorage.getItem(key);
                if (saved) {
                    try {
                        const parsed = JSON.parse(saved);
                        if (Array.isArray(parsed)) setSavedSlots(parsed.filter(i => i !== null));
                    } catch (e) { console.error(e); }
                } else {
                    setSavedSlots([]);
                }
            };

            const persistSlots = (newSlots) => {
                setSavedSlots(newSlots);
                try {
                    localStorage.setItem(THEMES[mode].storageKey, JSON.stringify(newSlots));
                } catch (e) { alert("Penyimpanan penuh."); }
            };

            // --- HANDLERS ---
            const handleInputChange = (section, field, value) => {
                setDocData(prev => {
                    if (section === 'root') return { ...prev, [field]: value };
                    return { ...prev, [section]: { ...prev[section], [field]: value } };
                });
            };

            const handleImage = (e, field) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => handleInputChange('root', field, reader.result);
                    reader.readAsDataURL(file);
                }
            };

            const handleItemChange = (id, field, value) => {
                setItems(prev => prev.map(i => i.id === id ? { ...i, [field]: field === 'description' ? value : parseFloat(value) || 0 } : i));
            };

            const addItem = () => setItems([...items, { id: Date.now(), description: '', quantity: 1, price: 0, discount: 0 }]);
            const removeItem = (id) => setItems(items.filter(i => i.id !== id));

            // --- STORAGE ACTIONS ---
            const handleSaveNewSlot = () => {
                const newSlot = {
                    meta: { 
                        number: docData.number, 
                        clientName: docData.client.name, 
                        date: docData.date,
                        savedAt: Date.now()
                    },
                    data: docData,
                    items: items
                };
                const newSlots = [newSlot, ...savedSlots];
                persistSlots(newSlots);
                alert(`Berhasil disimpan di slot ${mode.toUpperCase()}!`);
            };

            const handleLoadFromSlot = (index) => {
                const slot = savedSlots[index];
                if (slot && window.confirm(`Muat data ${slot.meta.number}?`)) {
                    setDocData(slot.data);
                    setItems(slot.items);
                    setShowSaveModal(false);
                }
            };

            const handleDeleteSlot = (index) => {
                if (window.confirm('Hapus item ini?')) {
                    const newSlots = savedSlots.filter((_, i) => i !== index);
                    persistSlots(newSlots);
                }
            };

            // --- CALCULATIONS ---
            const calculations = useMemo(() => {
                const subtotal = items.reduce((sum, item) => sum + calculateItemSubtotal(item), 0);
                const globalDiscountAmount = (subtotal * docData.discountRate) / 100;
                const subtotalAfterGlobalDisc = subtotal - globalDiscountAmount;
                let taxAmount = 0;
                let grandTotal = 0;
                if (docData.taxType === 'inclusive') {
                    const basePrice = subtotalAfterGlobalDisc / (1 + docData.taxRate / 100);
                    taxAmount = subtotalAfterGlobalDisc - basePrice;
                    grandTotal = subtotalAfterGlobalDisc;
                } else {
                    taxAmount = (subtotalAfterGlobalDisc * docData.taxRate) / 100;
                    grandTotal = subtotalAfterGlobalDisc + taxAmount;
                }
                return { subtotal, globalDiscountAmount, taxAmount, grandTotal };
            }, [items, docData.taxRate, docData.taxType, docData.discountRate]);

            // --- PDF ---
            const handleDownloadPDF = async () => {
                setIsGenerating(true);
                const element = document.getElementById('preview-area');
                const opt = {
                    margin: 0,
                    filename: `${theme.label}-${docData.number.replace(/[\/\\:]/g, '-')}.pdf`,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 2, useCORS: true, logging: false },
                    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
                };
                try { await html2pdf().set(opt).from(element).save(); } catch (error) { alert("Gagal export PDF."); } finally { setIsGenerating(false); }
            };

            // --- CSV EXPORT ---
            const handleExportCSV = () => {
                if (savedSlots.length === 0) return alert("Tidak ada data.");
                const headers = ["Nomor", "Tanggal", "Klien", "Email", "Total (IDR)"];
                const rows = savedSlots.map(s => {
                    // Simple total calculation for CSV preview
                    const total = s.items.reduce((acc, i) => acc + (i.price * i.quantity), 0); 
                    return `"${s.meta.number}","${s.meta.date}","${s.meta.clientName}","${s.data.client.email}","${total}"`;
                });
                const csv = [headers.join(","), ...rows].join("\n");
                const blob = new Blob([csv], { type: 'text/csv' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `Backup_${mode}.csv`;
                a.click();
            };

            // --- GESTURE PREVIEW LOGIC ---
            const resetView = () => setTransform({ x: 0, y: 0, scale: 0.55 });
            const handleTouchStart = (e) => {
                if (e.touches.length === 1) lastTouchRef.current = { x: e.touches[0].clientX, y: e.touches[0].clientY, dist: 0 };
                else if (e.touches.length === 2) {
                    const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                    lastTouchRef.current = { ...lastTouchRef.current, dist };
                }
            };
            const handleTouchMove = (e) => {
                e.preventDefault();
                if (e.touches.length === 1) {
                    const dx = e.touches[0].clientX - lastTouchRef.current.x;
                    const dy = e.touches[0].clientY - lastTouchRef.current.y;
                    setTransform(p => ({ ...p, x: p.x + dx, y: p.y + dy }));
                    lastTouchRef.current = { ...lastTouchRef.current, x: e.touches[0].clientX, y: e.touches[0].clientY };
                } else if (e.touches.length === 2) {
                    const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                    const scaleFactor = dist / lastTouchRef.current.dist;
                    setTransform(p => ({ ...p, scale: Math.min(Math.max(p.scale * scaleFactor, 0.3), 4) }));
                    lastTouchRef.current = { ...lastTouchRef.current, dist };
                }
            };
            useEffect(() => { if(showMobilePreview) resetView(); }, [showMobilePreview]);

            return (
                <div className="min-h-screen flex flex-col">
