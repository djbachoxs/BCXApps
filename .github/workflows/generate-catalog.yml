name: Generate BCX Catalog

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
  workflow_dispatch:

jobs:
  build-catalog:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate catalog.json
        run: node scripts/generate-catalog.js

      - name: Commit & push catalog.json
        run: |
          git config user.name  "BCX Catalog Bot"
          git config user.email "bot@bcx-catalog"
          git add catalog.json
          git diff --cached --quiet && echo "No changes" || git commit -m "chore: update catalog.json [skip ci]"
          git push
